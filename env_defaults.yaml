common:
  observe:
    request_multiplier: 1
  build:
    commands:
    - - go
      - build
      - ./...
    - - go
      - vet
      - ./...
  stack:
    gateway:
      helmValues:
        gateway:
          provider: istio
          gatewayClassName: istio
          gatewayParameters:
            resources:
              limits:
                cpu: '16'
                memory: 16Gi
              requests:
                cpu: '4'
                memory: 4Gi
            istio:
              accessLogging: false
    model:
      modelName: Qwen/Qwen3-14B
      modelArtifacts:
        uri: hf://Qwen/Qwen3-14B
      vllm_image: ghcr.io/llm-d/llm-d-cuda:v0.6.0
      helmValues:
        modelArtifacts:
          authSecretName: hf-secret
        routing:
          servicePort: 8000
        prefill:
          create: false
        decode:
          create: true
          replicas: 4
          extraConfig:
            affinity:
              nodeAffinity:
                requiredDuringSchedulingIgnoredDuringExecution:
                  nodeSelectorTerms:
                  - matchExpressions:
                    - key: nvidia.com/gpu.product
                      operator: In
                      values:
                      - NVIDIA-H100-80GB-HBM3
                    - key: kubernetes.io/hostname
                      operator: NotIn
                      values:
                      - pokprod-b93r39s0
                      - pokprod-b93r43s2
                      - pokprod-b93r38s0
                      - pokprod-b93r43s1
          containers:
          - modelCommand: vllmServe
            mountModelVolume: true
            resources:
              limits:
                nvidia.com/gpu: 1
              requests:
                nvidia.com/gpu: 1
            args:
            - --max-model-len=40960
            - --block-size=64
            - --max-num-seqs=256
            - --max-num-batched-tokens=2048
            - --gpu-memory-utilization=0.75
            - --enable-prefix-caching
            - --enable-chunked-prefill
            - --kv-events-config
            - "{\n  \"enable_kv_cache_events\": true,\n  \"publisher\": \"zmq\",\n\
              \  \"endpoint\": \"tcp://gaie-$(GAIE_RELEASE_NAME_POSTFIX)-epp.$(NAMESPACE).svc.cluster.local:5557\"\
              ,\n  \"topic\": \"kv@$(POD_IP):8000@Qwen/Qwen3-14B\"\n}"
            env:
            - name: GAIE_RELEASE_NAME_POSTFIX
              value: 0
            - name: NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: POD_IP
              valueFrom:
                fieldRef:
                  apiVersion: v1
                  fieldPath: status.podIP
            - name: PYTHONHASHSEED
              value: '42'
            - name: TRITON_CACHE_DIR
              value: /tmp/.triton-cache
            extraConfig:
              startupProbe:
                httpGet:
                  path: /health
                  port: 8200
                failureThreshold: 60
                initialDelaySeconds: 30
                periodSeconds: 10
              readinessProbe:
                httpGet:
                  path: /health
                  port: 8200
                failureThreshold: 3
                periodSeconds: 5
    gaie:
      epp_image:
        upstream:
          hub: ghcr.io/llm-d
          name: llm-d-inference-scheduler
          tag: v0.7.1
          pullPolicy: Always
        build:
          hub: ghcr.io/kalantar
          name: llm-d-inference-scheduler
          tag: aw
          platform: linux/amd64
          pullPolicy: Always
scenarios:
  adaptive-weights:
    target:
      repo: llm-d-inference-scheduler
    config:
      kind: EndpointPickerConfig
      helm_path: gaie.treatment.helmValues.inferenceExtension.pluginsCustomConfig.custom-plugins.yaml
    stack:
      gaie:
        shared:
          helmValues:
            inferenceExtension:
              image:
                hub: ghcr.io/llm-d
                name: llm-d-inference-scheduler
                tag: v0.7.1
                pullPolicy: Always
              pluginsConfigFile: custom-plugins.yaml
              flags:
                v: 5
              monitoring:
                interval: 5s
              extProcPort: 9002
              extraContainerPorts:
              - name: zmq
                containerPort: 5557
                protocol: TCP
              extraServicePorts:
              - name: zmq
                port: 5557
                targetPort: 5557
                protocol: TCP
              env:
              - name: HF_TOKEN
                valueFrom:
                  secretKeyRef:
                    name: hf-secret
                    key: HF_TOKEN
              sidecar:
                enabled: true
                image: ghcr.io/llm-d/llm-d-uds-tokenizer:v0.7.1
                imagePullPolicy: IfNotPresent
                name: tokenizer-uds
                configMap:
                  name: tokenizer-uds-config
                  data:
                    placeholder: ''
                env:
                - name: TOKENIZERS_DIR
                  value: /tokenizers
                - name: HF_HOME
                  value: /tokenizers
                volumeMounts:
                - mountPath: /tokenizers
                  name: tokenizers
                - mountPath: /tmp/tokenizer
                  name: tokenizer-uds
              volumes:
              - name: tokenizers
                emptyDir: {}
              - name: tokenizer-uds
                emptyDir: {}
              volumeMounts:
              - mountPath: /tmp/tokenizer
                name: tokenizer-uds
            provider:
              name: istio
            istio:
              destinationRule:
                trafficPolicy:
                  connectionPool:
                    http:
                      http1MaxPendingRequests: 256000
                      maxRequestsPerConnection: 256000
                      http2MaxRequests: 256000
                      idleTimeout: 900s
                    tcp:
                      maxConnections: 256000
                      maxConnectionDuration: 1800s
                      connectTimeout: 900s
