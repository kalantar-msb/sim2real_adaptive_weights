apiVersion: inference.networking.x-k8s.io/v1alpha1
kind: EndpointPickerConfig
plugins:
  - name: profile
    type: single-profile-handler
  - name: tokenizer
    type: tokenizer
    parameters:
      modelName: Qwen/Qwen3-14B
      udsTokenizerConfig:
        socketFile: /tmp/tokenizer/tokenizer-uds.socket
  - name: ppc
    type: precise-prefix-cache-scorer
    parameters:
      tokenProcessorConfig:
        blockSize: 64
      indexerConfig:
        speculativeIndexing: true
        tokenizersPoolConfig:
          modelName: Qwen/Qwen3-14B
          local: null
          hf: null
          uds:
            socketFile: /tmp/tokenizer/tokenizer-uds.socket
      kvEventsConfig:
        topicFilter: "kv@"
        concurrency: 4
        discoverPods: false
        zmqEndpoint: "tcp://*:5557"
  - name: kv
    type: kv-cache-utilization-scorer
  - name: qd
    type: queue-scorer
  - name: picker
    type: max-score-picker
schedulingProfiles:
  - name: default
    plugins:
      - pluginRef: ppc
        weight: 3.0
      - pluginRef: kv
        weight: 2.0
      - pluginRef: qd
        weight: 2.0
      - pluginRef: picker
