apiVersion: tekton.dev/v1
kind: PipelineRun
metadata:
  name: baseline-awc
  namespace: kalantar
spec:
  params:
  - name: namespace
    value: kalantar
  - name: experimentId
    value: awc
  - name: runName
    value: awc
  - name: workloadName-baseline-w1-prefix-to-load-shift
    value: w1_prefix_to_load_shift
  - name: workloadSpec-baseline-w1-prefix-to-load-shift
    value: "{aggregate_rate: 40, clients: [{arrival: {process: poisson}, id: phase1-prefix-A,\n\
      \      input_distribution: {params: {max: 1024, mean: 512, min: 128, std_dev:\
      \ 128},\n        type: gaussian}, lifecycle: {windows: [{end_us: 50000000, start_us:\
      \ 0}]},\n      output_distribution: {params: {max: 768, mean: 256, min: 32,\
      \ std_dev: 128},\n        type: gaussian}, prefix_group: system-prompt-A, prefix_length:\
      \ 512, rate_fraction: 0.7,\n      streaming: true}, {arrival: {process: poisson},\
      \ id: phase1-cold, input_distribution: {\n        params: {max: 512, mean: 256,\
      \ min: 64, std_dev: 64}, type: gaussian}, lifecycle: {\n        windows: [{end_us:\
      \ 50000000, start_us: 0}]}, output_distribution: {params: {\n          max:\
      \ 512, mean: 128, min: 32, std_dev: 64}, type: gaussian}, rate_fraction: 0.3,\n\
      \      streaming: true}, {arrival: {process: poisson}, id: phase2-cold, input_distribution:\
      \ {\n        params: {max: 768, mean: 384, min: 64, std_dev: 128}, type: gaussian},\
      \ lifecycle: {\n        windows: [{end_us: 100000000, start_us: 50000000}]},\
      \ output_distribution: {\n        params: {max: 640, mean: 192, min: 32, std_dev:\
      \ 96}, type: gaussian}, rate_fraction: 1.0,\n      streaming: true}], horizon:\
      \ 100000000, num_requests: 4000, seed: 42, version: '2'}"
  - name: workloadName-baseline-w2-stationary
    value: w2_stationary
  - name: workloadSpec-baseline-w2-stationary
    value: "{aggregate_rate: 40, clients: [{arrival: {process: poisson}, id: prefix-A,\
      \ input_distribution: {\n        params: {max: 1024, mean: 512, min: 128, std_dev:\
      \ 128}, type: gaussian}, output_distribution: {\n        params: {max: 768,\
      \ mean: 256, min: 32, std_dev: 128}, type: gaussian}, prefix_group: system-prompt-A,\n\
      \      prefix_length: 512, rate_fraction: 0.6, streaming: true}, {arrival: {process:\
      \ poisson},\n      id: cold-queries, input_distribution: {params: {max: 512,\
      \ mean: 256, min: 64,\n          std_dev: 64}, type: gaussian}, output_distribution:\
      \ {params: {max: 512,\n          mean: 128, min: 32, std_dev: 64}, type: gaussian},\
      \ rate_fraction: 0.4, streaming: true}],\n  horizon: 100000000, num_requests:\
      \ 4000, seed: 42, version: '2'}"
  - name: workloadName-baseline-w3-multi-prefix-contention
    value: w3_multi_prefix_contention
  - name: workloadSpec-baseline-w3-multi-prefix-contention
    value: "{aggregate_rate: 40, clients: [{arrival: {process: poisson}, id: phase1-prefix-A,\n\
      \      input_distribution: {params: {max: 1024, mean: 512, min: 128, std_dev:\
      \ 128},\n        type: gaussian}, lifecycle: {windows: [{end_us: 50000000, start_us:\
      \ 0}]},\n      output_distribution: {params: {max: 768, mean: 256, min: 32,\
      \ std_dev: 128},\n        type: gaussian}, prefix_group: system-prompt-A, prefix_length:\
      \ 512, rate_fraction: 0.85,\n      streaming: true}, {arrival: {process: poisson},\
      \ id: phase1-cold, input_distribution: {\n        params: {max: 512, mean: 256,\
      \ min: 64, std_dev: 64}, type: gaussian}, lifecycle: {\n        windows: [{end_us:\
      \ 50000000, start_us: 0}]}, output_distribution: {params: {\n          max:\
      \ 512, mean: 128, min: 32, std_dev: 64}, type: gaussian}, rate_fraction: 0.15,\n\
      \      streaming: true}, {arrival: {process: poisson}, id: phase2-prefix-B,\
      \ input_distribution: {\n        params: {max: 1024, mean: 512, min: 128, std_dev:\
      \ 128}, type: gaussian}, lifecycle: {\n        windows: [{end_us: 100000000,\
      \ start_us: 50000000}]}, output_distribution: {\n        params: {max: 768,\
      \ mean: 256, min: 32, std_dev: 128}, type: gaussian}, prefix_group: system-prompt-B,\n\
      \      prefix_length: 512, rate_fraction: 0.85, streaming: true}, {arrival:\
      \ {process: poisson},\n      id: phase2-cold, input_distribution: {params: {max:\
      \ 512, mean: 256, min: 64,\n          std_dev: 64}, type: gaussian}, lifecycle:\
      \ {windows: [{end_us: 100000000,\n            start_us: 50000000}]}, output_distribution:\
      \ {params: {max: 512, mean: 128,\n          min: 32, std_dev: 64}, type: gaussian},\
      \ rate_fraction: 0.15, streaming: true}],\n  horizon: 100000000, num_requests:\
      \ 4000, seed: 42, version: '2'}"
  pipelineRef:
    name: sim2real-baseline-awc
  timeouts:
    pipeline: 4h
  workspaces:
  - name: model-cache
    persistentVolumeClaim:
      claimName: model-pvc
  - name: hf-credentials
    secret:
      secretName: hf-secret
  - name: data-storage
    persistentVolumeClaim:
      claimName: data-pvc
