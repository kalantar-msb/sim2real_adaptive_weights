apiVersion: tekton.dev/v1
kind: Pipeline
metadata:
  name: sim2real-baseline-awc
spec:
  finally:
  - name: baseline-w1-prefix-to-load-shift-delete-inference-objectives-c
    params:
    - name: objectives
      value: '[]'
    - name: namespace
      value: $(params.namespace)
    taskRef:
      name: delete-inference-objectives
  - name: baseline-w1-prefix-to-load-shift-delete-httproute-c
    params:
    - name: modelLabel
      value: sim2real-$(params.experimentId)
    - name: namespace
      value: $(params.namespace)
    taskRef:
      name: delete-httproute
  - name: baseline-w1-prefix-to-load-shift-delete-model-c
    params:
    - name: modelLabel
      value: sim2real-$(params.experimentId)
    - name: namespace
      value: $(params.namespace)
    taskRef:
      name: delete-model
  - name: baseline-w1-prefix-to-load-shift-delete-gaie-c
    params:
    - name: modelLabel
      value: sim2real-$(params.experimentId)
    - name: namespace
      value: $(params.namespace)
    taskRef:
      name: delete-gaie
  - name: baseline-w1-prefix-to-load-shift-delete-gateway-c
    params:
    - name: experimentId
      value: $(params.experimentId)
    - name: namespace
      value: $(params.namespace)
    taskRef:
      name: delete-gateway
  - name: baseline-w2-stationary-delete-inference-objectives-c
    params:
    - name: objectives
      value: '[]'
    - name: namespace
      value: $(params.namespace)
    taskRef:
      name: delete-inference-objectives
  - name: baseline-w2-stationary-delete-httproute-c
    params:
    - name: modelLabel
      value: sim2real-$(params.experimentId)
    - name: namespace
      value: $(params.namespace)
    taskRef:
      name: delete-httproute
  - name: baseline-w2-stationary-delete-model-c
    params:
    - name: modelLabel
      value: sim2real-$(params.experimentId)
    - name: namespace
      value: $(params.namespace)
    taskRef:
      name: delete-model
  - name: baseline-w2-stationary-delete-gaie-c
    params:
    - name: modelLabel
      value: sim2real-$(params.experimentId)
    - name: namespace
      value: $(params.namespace)
    taskRef:
      name: delete-gaie
  - name: baseline-w2-stationary-delete-gateway-c
    params:
    - name: experimentId
      value: $(params.experimentId)
    - name: namespace
      value: $(params.namespace)
    taskRef:
      name: delete-gateway
  - name: baseline-w3-multi-prefix-contention-delete-inference-objectiv-c
    params:
    - name: objectives
      value: '[]'
    - name: namespace
      value: $(params.namespace)
    taskRef:
      name: delete-inference-objectives
  - name: baseline-w3-multi-prefix-contention-delete-httproute-c
    params:
    - name: modelLabel
      value: sim2real-$(params.experimentId)
    - name: namespace
      value: $(params.namespace)
    taskRef:
      name: delete-httproute
  - name: baseline-w3-multi-prefix-contention-delete-model-c
    params:
    - name: modelLabel
      value: sim2real-$(params.experimentId)
    - name: namespace
      value: $(params.namespace)
    taskRef:
      name: delete-model
  - name: baseline-w3-multi-prefix-contention-delete-gaie-c
    params:
    - name: modelLabel
      value: sim2real-$(params.experimentId)
    - name: namespace
      value: $(params.namespace)
    taskRef:
      name: delete-gaie
  - name: baseline-w3-multi-prefix-contention-delete-gateway-c
    params:
    - name: experimentId
      value: $(params.experimentId)
    - name: namespace
      value: $(params.namespace)
    taskRef:
      name: delete-gateway
  params:
  - name: namespace
    type: string
  - name: experimentId
    type: string
  - name: runName
    type: string
  - default: 30s
    name: sleepDuration
    type: string
  - name: workloadName-baseline-w1-prefix-to-load-shift
    type: string
  - name: workloadSpec-baseline-w1-prefix-to-load-shift
    type: string
  - name: workloadName-baseline-w2-stationary
    type: string
  - name: workloadSpec-baseline-w2-stationary
    type: string
  - name: workloadName-baseline-w3-multi-prefix-contention
    type: string
  - name: workloadSpec-baseline-w3-multi-prefix-contention
    type: string
  tasks:
  - name: baseline-w1-prefix-to-load-shift-download-model
    params:
    - name: model
      value: Qwen/Qwen3-14B
    taskRef:
      name: download-model
    workspaces:
    - name: model-cache
      workspace: model-cache
    - name: hf-credentials
      workspace: hf-credentials
  - name: baseline-w1-prefix-to-load-shift-deploy-gateway
    params:
    - name: experimentId
      value: $(params.experimentId)
    - name: namespace
      value: $(params.namespace)
    - name: config
      value:
        gateway:
          gatewayClassName: istio
          gatewayParameters:
            istio:
              accessLogging: false
            resources:
              limits:
                cpu: '16'
                memory: 16Gi
              requests:
                cpu: '4'
                memory: 4Gi
          provider: istio
    taskRef:
      name: deploy-gateway
  - name: baseline-w1-prefix-to-load-shift-deploy-gaie
    params:
    - name: modelLabel
      value: sim2real-$(params.experimentId)
    - name: config
      value: '{"inferenceExtension": {"image": {"hub": "ghcr.io/llm-d", "name": "llm-d-inference-scheduler",
        "tag": "v0.7.1", "pullPolicy": "Always"}, "pluginsConfigFile": "custom-plugins.yaml",
        "flags": {"v": 5}, "monitoring": {"interval": "5s"}, "extProcPort": 9002,
        "extraContainerPorts": [{"name": "zmq", "containerPort": 5557, "protocol":
        "TCP"}], "extraServicePorts": [{"name": "zmq", "port": 5557, "targetPort":
        5557, "protocol": "TCP"}], "env": [{"name": "HF_TOKEN", "valueFrom": {"secretKeyRef":
        {"name": "hf-secret", "key": "HF_TOKEN"}}}], "sidecar": {"enabled": true,
        "image": "ghcr.io/llm-d/llm-d-uds-tokenizer:v0.7.1", "imagePullPolicy": "IfNotPresent",
        "name": "tokenizer-uds", "configMap": {"name": "tokenizer-uds-config", "data":
        {"placeholder": ""}}, "env": [{"name": "TOKENIZERS_DIR", "value": "/tokenizers"},
        {"name": "HF_HOME", "value": "/tokenizers"}], "volumeMounts": [{"mountPath":
        "/tokenizers", "name": "tokenizers"}, {"mountPath": "/tmp/tokenizer", "name":
        "tokenizer-uds"}]}, "volumes": [{"name": "tokenizers", "emptyDir": {}}, {"name":
        "tokenizer-uds", "emptyDir": {}}], "volumeMounts": [{"mountPath": "/tmp/tokenizer",
        "name": "tokenizer-uds"}], "pluginsCustomConfig": {"custom-plugins.yaml":
        "apiVersion: inference.networking.x-k8s.io/v1alpha1\nkind: EndpointPickerConfig\nplugins:\n  -
        name: profile\n    type: single-profile-handler\n  - name: tokenizer\n    type:
        tokenizer\n    parameters:\n      modelName: Qwen/Qwen3-14B\n      udsTokenizerConfig:\n        socketFile:
        /tmp/tokenizer/tokenizer-uds.socket\n  - name: ppc\n    type: precise-prefix-cache-scorer\n    parameters:\n      tokenProcessorConfig:\n        blockSize:
        64\n      indexerConfig:\n        speculativeIndexing: true\n        tokenizersPoolConfig:\n          modelName:
        Qwen/Qwen3-14B\n          local: null\n          hf: null\n          uds:\n            socketFile:
        /tmp/tokenizer/tokenizer-uds.socket\n      kvEventsConfig:\n        topicFilter:
        \"kv@\"\n        concurrency: 4\n        discoverPods: false\n        zmqEndpoint:
        \"tcp://*:5557\"\n  - name: kv\n    type: kv-cache-utilization-scorer\n  -
        name: qd\n    type: queue-scorer\n  - name: picker\n    type: max-score-picker\nschedulingProfiles:\n  -
        name: default\n    plugins:\n      - pluginRef: ppc\n        weight: 3.0\n      -
        pluginRef: kv\n        weight: 2.0\n      - pluginRef: qd\n        weight:
        2.0\n      - pluginRef: picker\n"}}, "provider": {"name": "istio"}, "istio":
        {"destinationRule": {"trafficPolicy": {"connectionPool": {"http": {"http1MaxPendingRequests":
        256000, "maxRequestsPerConnection": 256000, "http2MaxRequests": 256000, "idleTimeout":
        "900s"}, "tcp": {"maxConnections": 256000, "maxConnectionDuration": "1800s",
        "connectTimeout": "900s"}}}}}}'
    - name: namespace
      value: $(params.namespace)
    taskRef:
      name: deploy-gaie
  - name: baseline-w1-prefix-to-load-shift-deploy-model
    params:
    - name: model
      value: Qwen/Qwen3-14B
    - name: modelLabel
      value: sim2real-$(params.experimentId)
    - name: namespace
      value: $(params.namespace)
    - name: config
      value:
        decode:
          containers:
          - args:
            - --max-model-len=40960
            - --block-size=64
            - --max-num-seqs=256
            - --max-num-batched-tokens=2048
            - --gpu-memory-utilization=0.75
            - --enable-prefix-caching
            - --enable-chunked-prefill
            - --kv-events-config
            - "{\n  \"enable_kv_cache_events\": true,\n  \"publisher\": \"zmq\",\n\
              \  \"endpoint\": \"tcp://gaie-$(GAIE_RELEASE_NAME_POSTFIX)-epp.$(NAMESPACE).svc.cluster.local:5557\"\
              ,\n  \"topic\": \"kv@$(POD_IP):8000@Qwen/Qwen3-14B\"\n}"
            env:
            - name: GAIE_RELEASE_NAME_POSTFIX
              value: sim2real-awc
            - name: NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: POD_IP
              valueFrom:
                fieldRef:
                  apiVersion: v1
                  fieldPath: status.podIP
            - name: PYTHONHASHSEED
              value: '42'
            - name: TRITON_CACHE_DIR
              value: /tmp/.triton-cache
            extraConfig:
              readinessProbe:
                failureThreshold: 3
                httpGet:
                  path: /health
                  port: 8200
                periodSeconds: 5
              startupProbe:
                failureThreshold: 60
                httpGet:
                  path: /health
                  port: 8200
                initialDelaySeconds: 30
                periodSeconds: 10
            image: ghcr.io/llm-d/llm-d-cuda:v0.6.0
            modelCommand: vllmServe
            mountModelVolume: true
            resources:
              limits:
                nvidia.com/gpu: 1
              requests:
                nvidia.com/gpu: 1
          create: true
          extraConfig:
            affinity:
              nodeAffinity:
                requiredDuringSchedulingIgnoredDuringExecution:
                  nodeSelectorTerms:
                  - matchExpressions:
                    - key: nvidia.com/gpu.product
                      operator: In
                      values:
                      - NVIDIA-H100-80GB-HBM3
                    - key: kubernetes.io/hostname
                      operator: NotIn
                      values:
                      - pokprod-b93r39s0
                      - pokprod-b93r43s2
                      - pokprod-b93r38s0
                      - pokprod-b93r43s1
          replicas: 4
        modelArtifacts:
          authSecretName: hf-secret
        prefill:
          create: false
        routing:
          servicePort: 8000
    runAfter:
    - baseline-w1-prefix-to-load-shift-download-model
    - baseline-w1-prefix-to-load-shift-deploy-gaie
    taskRef:
      name: deploy-model
    workspaces:
    - name: model-cache
      workspace: model-cache
  - name: baseline-w1-prefix-to-load-shift-pause-after-model-deploy
    params:
    - name: duration
      value: $(params.sleepDuration)
    runAfter:
    - baseline-w1-prefix-to-load-shift-deploy-model
    taskRef:
      name: sleep
  - name: baseline-w1-prefix-to-load-shift-deploy-httproute
    params:
    - name: namespace
      value: $(params.namespace)
    - name: gateway
      value: $(tasks.baseline-w1-prefix-to-load-shift-deploy-gateway.results.gateway)
    - name: inferencepool
      value: $(tasks.baseline-w1-prefix-to-load-shift-deploy-gaie.results.inferencepool)
    - name: modelLabel
      value: sim2real-$(params.experimentId)
    runAfter:
    - baseline-w1-prefix-to-load-shift-deploy-gateway
    - baseline-w1-prefix-to-load-shift-deploy-gaie
    taskRef:
      name: deploy-httproute
  - name: baseline-w1-prefix-to-load-shift-deploy-inference-objectives
    params:
    - name: namespace
      value: $(params.namespace)
    - name: inferencepool
      value: $(tasks.baseline-w1-prefix-to-load-shift-deploy-gaie.results.inferencepool)
    - name: objectives
      value: '[]'
    runAfter:
    - baseline-w1-prefix-to-load-shift-deploy-gaie
    taskRef:
      name: deploy-inference-objectives
  - name: baseline-w1-prefix-to-load-shift-run-workload
    params:
    - name: endpoint
      value: http://$(tasks.baseline-w1-prefix-to-load-shift-deploy-gateway.results.endpoint)/sim2real-$(params.experimentId)
    - name: model
      value: Qwen/Qwen3-14B
    - name: workloadSpec
      value: $(params.workloadSpec-baseline-w1-prefix-to-load-shift)
    - name: blisImage
      value: ghcr.io/inference-sim/blis:v0.7.6
    - name: resultsDir
      value: $(params.runName)/baseline/$(params.workloadName-baseline-w1-prefix-to-load-shift)
    runAfter:
    - baseline-w1-prefix-to-load-shift-pause-after-model-deploy
    - baseline-w1-prefix-to-load-shift-deploy-httproute
    - baseline-w1-prefix-to-load-shift-deploy-inference-objectives
    taskRef:
      name: run-workload-blis-observe
    workspaces:
    - name: data
      workspace: data-storage
  - name: baseline-w1-prefix-to-load-shift-collect-results
    params:
    - name: namespace
      value: $(params.namespace)
    - name: modelLabel
      value: sim2real-$(params.experimentId)
    - name: resultsDir
      value: $(params.runName)/baseline/$(params.workloadName-baseline-w1-prefix-to-load-shift)
    - name: containerName
      value: $(tasks.baseline-w1-prefix-to-load-shift-deploy-gaie.results.epp-container)
    runAfter:
    - baseline-w1-prefix-to-load-shift-run-workload
    taskRef:
      name: collect-results
    workspaces:
    - name: data
      workspace: data-storage
  - name: baseline-w1-prefix-to-load-shift-delete-inference-objectives
    params:
    - name: objectives
      value: '[]'
    - name: namespace
      value: $(params.namespace)
    runAfter:
    - baseline-w1-prefix-to-load-shift-collect-results
    taskRef:
      name: delete-inference-objectives
  - name: baseline-w1-prefix-to-load-shift-delete-httproute
    params:
    - name: modelLabel
      value: sim2real-$(params.experimentId)
    - name: namespace
      value: $(params.namespace)
    runAfter:
    - baseline-w1-prefix-to-load-shift-collect-results
    taskRef:
      name: delete-httproute
  - name: baseline-w1-prefix-to-load-shift-delete-model
    params:
    - name: modelLabel
      value: sim2real-$(params.experimentId)
    - name: namespace
      value: $(params.namespace)
    runAfter:
    - baseline-w1-prefix-to-load-shift-collect-results
    taskRef:
      name: delete-model
  - name: baseline-w1-prefix-to-load-shift-delete-gaie
    params:
    - name: modelLabel
      value: sim2real-$(params.experimentId)
    - name: namespace
      value: $(params.namespace)
    runAfter:
    - baseline-w1-prefix-to-load-shift-collect-results
    taskRef:
      name: delete-gaie
  - name: baseline-w1-prefix-to-load-shift-delete-gateway
    params:
    - name: experimentId
      value: $(params.experimentId)
    - name: namespace
      value: $(params.namespace)
    runAfter:
    - baseline-w1-prefix-to-load-shift-collect-results
    taskRef:
      name: delete-gateway
  - name: baseline-w2-stationary-download-model
    params:
    - name: model
      value: Qwen/Qwen3-14B
    runAfter:
    - baseline-w1-prefix-to-load-shift-delete-inference-objectives
    - baseline-w1-prefix-to-load-shift-delete-httproute
    - baseline-w1-prefix-to-load-shift-delete-model
    - baseline-w1-prefix-to-load-shift-delete-gaie
    - baseline-w1-prefix-to-load-shift-delete-gateway
    taskRef:
      name: download-model
    workspaces:
    - name: model-cache
      workspace: model-cache
    - name: hf-credentials
      workspace: hf-credentials
  - name: baseline-w2-stationary-deploy-gateway
    params:
    - name: experimentId
      value: $(params.experimentId)
    - name: namespace
      value: $(params.namespace)
    - name: config
      value:
        gateway:
          gatewayClassName: istio
          gatewayParameters:
            istio:
              accessLogging: false
            resources:
              limits:
                cpu: '16'
                memory: 16Gi
              requests:
                cpu: '4'
                memory: 4Gi
          provider: istio
    runAfter:
    - baseline-w1-prefix-to-load-shift-delete-inference-objectives
    - baseline-w1-prefix-to-load-shift-delete-httproute
    - baseline-w1-prefix-to-load-shift-delete-model
    - baseline-w1-prefix-to-load-shift-delete-gaie
    - baseline-w1-prefix-to-load-shift-delete-gateway
    taskRef:
      name: deploy-gateway
  - name: baseline-w2-stationary-deploy-gaie
    params:
