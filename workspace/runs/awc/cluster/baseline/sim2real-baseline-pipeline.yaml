        "flags": {"v": 5}, "monitoring": {"interval": "5s"}, "extProcPort": 9002,
        "extraContainerPorts": [{"name": "zmq", "containerPort": 5557, "protocol":
        "TCP"}], "extraServicePorts": [{"name": "zmq", "port": 5557, "targetPort":
        5557, "protocol": "TCP"}], "env": [{"name": "HF_TOKEN", "valueFrom": {"secretKeyRef":
        {"name": "hf-secret", "key": "HF_TOKEN"}}}], "sidecar": {"enabled": true,
        "image": "ghcr.io/llm-d/llm-d-uds-tokenizer:v0.7.1", "imagePullPolicy": "IfNotPresent",
        "name": "tokenizer-uds", "configMap": {"name": "tokenizer-uds-config", "data":
        {"placeholder": ""}}, "env": [{"name": "TOKENIZERS_DIR", "value": "/tokenizers"},
        {"name": "HF_HOME", "value": "/tokenizers"}], "volumeMounts": [{"mountPath":
        "/tokenizers", "name": "tokenizers"}, {"mountPath": "/tmp/tokenizer", "name":
        "tokenizer-uds"}]}, "volumes": [{"name": "tokenizers", "emptyDir": {}}, {"name":
        "tokenizer-uds", "emptyDir": {}}], "volumeMounts": [{"mountPath": "/tmp/tokenizer",
        "name": "tokenizer-uds"}], "pluginsCustomConfig": {"custom-plugins.yaml":
        "apiVersion: inference.networking.x-k8s.io/v1alpha1\nkind: EndpointPickerConfig\nplugins:\n  -
        name: profile\n    type: single-profile-handler\n  - name: tokenizer\n    type:
        tokenizer\n    parameters:\n      modelName: Qwen/Qwen3-14B\n      udsTokenizerConfig:\n        socketFile:
        /tmp/tokenizer/tokenizer-uds.socket\n  - name: ppc\n    type: precise-prefix-cache-scorer\n    parameters:\n      tokenProcessorConfig:\n        blockSize:
        64\n      indexerConfig:\n        speculativeIndexing: true\n        tokenizersPoolConfig:\n          modelName:
        Qwen/Qwen3-14B\n          local: null\n          hf: null\n          uds:\n            socketFile:
        /tmp/tokenizer/tokenizer-uds.socket\n      kvEventsConfig:\n        topicFilter:
        \"kv@\"\n        concurrency: 4\n        discoverPods: false\n        zmqEndpoint:
        \"tcp://*:5557\"\n  - name: kv\n    type: kv-cache-utilization-scorer\n  -
        name: qd\n    type: queue-scorer\n  - name: picker\n    type: max-score-picker\nschedulingProfiles:\n  -
        name: default\n    plugins:\n      - pluginRef: ppc\n        weight: 3.0\n      -
        pluginRef: kv\n        weight: 2.0\n      - pluginRef: qd\n        weight:
        2.0\n      - pluginRef: picker\n"}}, "provider": {"name": "istio"}, "istio":
        {"destinationRule": {"trafficPolicy": {"connectionPool": {"http": {"http1MaxPendingRequests":
        256000, "maxRequestsPerConnection": 256000, "http2MaxRequests": 256000, "idleTimeout":
        "900s"}, "tcp": {"maxConnections": 256000, "maxConnectionDuration": "1800s",
        "connectTimeout": "900s"}}}}}}'
    - name: namespace
      value: $(params.namespace)
    runAfter:
    - baseline-w1-prefix-to-load-shift-delete-inference-objectives
    - baseline-w1-prefix-to-load-shift-delete-httproute
    - baseline-w1-prefix-to-load-shift-delete-model
    - baseline-w1-prefix-to-load-shift-delete-gaie
    - baseline-w1-prefix-to-load-shift-delete-gateway
    taskRef:
      name: deploy-gaie
  - name: baseline-w2-stationary-deploy-model
    params:
    - name: model
      value: Qwen/Qwen3-14B
    - name: modelLabel
      value: sim2real-$(params.experimentId)
    - name: namespace
      value: $(params.namespace)
    - name: config
      value:
        decode:
          containers:
          - args:
            - --max-model-len=40960
            - --block-size=64
            - --max-num-seqs=256
            - --max-num-batched-tokens=2048
