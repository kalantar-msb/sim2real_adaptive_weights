            - --enable-prefix-caching
            - --enable-chunked-prefill
            - --kv-events-config
            - "{\n  \"enable_kv_cache_events\": true,\n  \"publisher\": \"zmq\",\n\
              \  \"endpoint\": \"tcp://gaie-$(GAIE_RELEASE_NAME_POSTFIX)-epp.$(NAMESPACE).svc.cluster.local:5557\"\
              ,\n  \"topic\": \"kv@$(POD_IP):8000@Qwen/Qwen3-14B\"\n}"
            env:
            - name: GAIE_RELEASE_NAME_POSTFIX
              value: sim2real-awc
            - name: NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: POD_IP
              valueFrom:
                fieldRef:
                  apiVersion: v1
                  fieldPath: status.podIP
            - name: PYTHONHASHSEED
              value: '42'
            - name: TRITON_CACHE_DIR
              value: /tmp/.triton-cache
            extraConfig:
              readinessProbe:
                failureThreshold: 3
                httpGet:
                  path: /health
                  port: 8200
                periodSeconds: 5
              startupProbe:
                failureThreshold: 60
                httpGet:
                  path: /health
                  port: 8200
                initialDelaySeconds: 30
