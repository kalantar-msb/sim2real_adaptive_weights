observe:
  image: ghcr.io/inference-sim/blis:v0.7.10
  workloads:
  - aggregate_rate: 40
    clients:
    - arrival:
        process: poisson
      id: phase1-prefix-A
      input_distribution:
        params:
          max: 1024
          mean: 512
          min: 128
          std_dev: 128
        type: gaussian
      lifecycle:
        windows:
        - end_us: 200000000
          start_us: 0
      output_distribution:
        params:
          max: 768
          mean: 256
          min: 32
          std_dev: 128
        type: gaussian
      prefix_group: system-prompt-A
      prefix_length: 512
      rate_fraction: 0.7
      streaming: true
    - arrival:
        process: poisson
      id: phase1-cold
      input_distribution:
        params:
          max: 512
          mean: 256
          min: 64
          std_dev: 64
        type: gaussian
      lifecycle:
        windows:
        - end_us: 200000000
          start_us: 0
      output_distribution:
        params:
          max: 512
          mean: 128
          min: 32
          std_dev: 64
        type: gaussian
      rate_fraction: 0.3
      streaming: true
    - arrival:
        process: poisson
      id: phase2-cold
      input_distribution:
        params:
          max: 768
          mean: 384
          min: 64
          std_dev: 128
        type: gaussian
      lifecycle:
        windows:
        - end_us: 400000000
          start_us: 200000000
      output_distribution:
        params:
          max: 640
          mean: 192
          min: 32
          std_dev: 96
        type: gaussian
      rate_fraction: 1.0
      streaming: true
    horizon: 400000000
    num_requests: 20000
    seed: 42
    version: '2'
    workload_name: w1_prefix_to_load_shift
  - aggregate_rate: 40
    clients:
    - arrival:
        process: poisson
      id: prefix-A
      input_distribution:
        params:
          max: 1024
          mean: 512
          min: 128
          std_dev: 128
        type: gaussian
      output_distribution:
        params:
          max: 768
          mean: 256
          min: 32
          std_dev: 128
        type: gaussian
      prefix_group: system-prompt-A
      prefix_length: 512
      rate_fraction: 0.6
      streaming: true
    - arrival:
        process: poisson
      id: cold-queries
      input_distribution:
        params:
          max: 512
          mean: 256
          min: 64
          std_dev: 64
        type: gaussian
      output_distribution:
        params:
          max: 512
          mean: 128
          min: 32
          std_dev: 64
        type: gaussian
      rate_fraction: 0.4
      streaming: true
    horizon: 400000000
    num_requests: 20000
    seed: 42
    version: '2'
    workload_name: w2_stationary
  - aggregate_rate: 40
    clients:
    - arrival:
        process: poisson
      id: phase1-prefix-A
      input_distribution:
        params:
          max: 1024
          mean: 512
          min: 128
          std_dev: 128
        type: gaussian
      lifecycle:
        windows:
        - end_us: 200000000
          start_us: 0
      output_distribution:
        params:
          max: 768
          mean: 256
          min: 32
          std_dev: 128
        type: gaussian
      prefix_group: system-prompt-A
      prefix_length: 512
      rate_fraction: 0.85
      streaming: true
    - arrival:
        process: poisson
      id: phase1-cold
      input_distribution:
        params:
          max: 512
          mean: 256
          min: 64
          std_dev: 64
        type: gaussian
      lifecycle:
        windows:
        - end_us: 200000000
          start_us: 0
      output_distribution:
        params:
          max: 512
          mean: 128
          min: 32
          std_dev: 64
        type: gaussian
      rate_fraction: 0.15
      streaming: true
    - arrival:
        process: poisson
      id: phase2-prefix-B
      input_distribution:
        params:
          max: 1024
          mean: 512
          min: 128
          std_dev: 128
        type: gaussian
      lifecycle:
        windows:
        - end_us: 400000000
          start_us: 200000000
      output_distribution:
        params:
          max: 768
          mean: 256
          min: 32
          std_dev: 128
        type: gaussian
      prefix_group: system-prompt-B
      prefix_length: 512
      rate_fraction: 0.85
      streaming: true
    - arrival:
        process: poisson
      id: phase2-cold
      input_distribution:
        params:
          max: 512
          mean: 256
          min: 64
          std_dev: 64
        type: gaussian
      lifecycle:
        windows:
        - end_us: 400000000
          start_us: 200000000
      output_distribution:
        params:
          max: 512
          mean: 128
          min: 32
          std_dev: 64
        type: gaussian
      rate_fraction: 0.15
      streaming: true
    horizon: 400000000
    num_requests: 20000
    seed: 42
    version: '2'
    workload_name: w3_multi_prefix_contention
stack:
  gateway:
    helmValues:
      gateway:
        provider: istio
        gatewayClassName: istio
        gatewayParameters:
          resources:
            limits:
              cpu: '16'
              memory: 16Gi
            requests:
              cpu: '4'
              memory: 4Gi
          istio:
            accessLogging: false
  model:
    modelName: Qwen/Qwen3-14B
    modelArtifacts:
      uri: hf://Qwen/Qwen3-14B
    helmValues:
      modelArtifacts:
        authSecretName: hf-secret
      routing:
        servicePort: 8000
      prefill:
        create: false
      decode:
        create: true
        replicas: 4
        extraConfig:
          affinity:
            nodeAffinity:
              requiredDuringSchedulingIgnoredDuringExecution:
                nodeSelectorTerms:
                - matchExpressions:
                  - key: nvidia.com/gpu.product
                    operator: In
                    values:
                    - NVIDIA-H100-80GB-HBM3
                  - key: kubernetes.io/hostname
                    operator: NotIn
                    values:
                    - pokprod-b93r39s0
                    - pokprod-b93r43s2
                    - pokprod-b93r38s0
                    - pokprod-b93r43s1
        containers:
        - modelCommand: vllmServe
          mountModelVolume: true
          resources:
            limits:
              nvidia.com/gpu: 1
            requests:
              nvidia.com/gpu: 1
          args:
          - --max-model-len=40960
          - --block-size=64
          - --max-num-seqs=256
          - --max-num-batched-tokens=2048
          - --gpu-memory-utilization=0.75
          - --enable-prefix-caching
          - --enable-chunked-prefill
          - --kv-events-config
          - "{\n  \"enable_kv_cache_events\": true,\n  \"publisher\": \"zmq\",\n \
            \ \"endpoint\": \"tcp://gaie-$(GAIE_RELEASE_NAME_POSTFIX)-epp.$(NAMESPACE).svc.cluster.local:5557\"\
            ,\n  \"topic\": \"kv@$(POD_IP):8000@Qwen/Qwen3-14B\"\n}"
          env:
          - name: GAIE_RELEASE_NAME_POSTFIX
            value: sim2real-aw
          - name: NAMESPACE
            valueFrom:
              fieldRef:
                fieldPath: metadata.namespace
          - name: POD_IP
            valueFrom:
              fieldRef:
                apiVersion: v1
                fieldPath: status.podIP
          - name: PYTHONHASHSEED
            value: '42'
          - name: TRITON_CACHE_DIR
            value: /tmp/.triton-cache
          extraConfig:
            startupProbe:
              httpGet:
                path: /health
                port: 8200
              failureThreshold: 60
              initialDelaySeconds: 30
              periodSeconds: 10
            readinessProbe:
              httpGet:
                path: /health
                port: 8200
              failureThreshold: 3
              periodSeconds: 5
          image: ghcr.io/llm-d/llm-d-cuda:v0.6.0
  gaie:
    baseline:
      helmValues:
        inferenceExtension:
          image:
            hub: ghcr.io/llm-d
            name: llm-d-inference-scheduler
            tag: v0.7.1
            pullPolicy: Always
          pluginsConfigFile: custom-plugins.yaml
          flags:
            v: 5
          monitoring:
            interval: 5s
          extProcPort: 9002
          extraContainerPorts:
          - name: zmq
            containerPort: 5557
            protocol: TCP
          extraServicePorts:
          - name: zmq
            port: 5557
            targetPort: 5557
            protocol: TCP
          env:
          - name: HF_TOKEN
            valueFrom:
              secretKeyRef:
                name: hf-secret
                key: HF_TOKEN
          sidecar:
            enabled: true
            image: ghcr.io/llm-d/llm-d-uds-tokenizer:v0.7.1
            imagePullPolicy: IfNotPresent
            name: tokenizer-uds
            configMap:
              name: tokenizer-uds-config
              data:
                placeholder: ''
            env:
            - name: TOKENIZERS_DIR
              value: /tokenizers
            - name: HF_HOME
              value: /tokenizers
            volumeMounts:
            - mountPath: /tokenizers
              name: tokenizers
            - mountPath: /tmp/tokenizer
              name: tokenizer-uds
          volumes:
          - name: tokenizers
            emptyDir: {}
          - name: tokenizer-uds
            emptyDir: {}
          volumeMounts:
          - mountPath: /tmp/tokenizer
            name: tokenizer-uds
          pluginsCustomConfig:
            custom-plugins.yaml: "apiVersion: inference.networking.x-k8s.io/v1alpha1\n\
              kind: EndpointPickerConfig\nplugins:\n  - name: profile\n    type: single-profile-handler\n\
              \  - name: tokenizer\n    type: tokenizer\n    parameters:\n      modelName:\
              \ Qwen/Qwen3-14B\n      udsTokenizerConfig:\n        socketFile: /tmp/tokenizer/tokenizer-uds.socket\n\
              \  - name: ppc\n    type: precise-prefix-cache-scorer\n    parameters:\n\
              \      speculativeIndexing: true\n      tokenProcessorConfig:\n    \
              \    blockSize: 64\n      indexerConfig:\n        tokenizersPoolConfig:\n\
              \          modelName: Qwen/Qwen3-14B\n          local: null\n      \
              \    hf: null\n          uds:\n            socketFile: /tmp/tokenizer/tokenizer-uds.socket\n\
              \      kvEventsConfig:\n        topicFilter: \"kv@\"\n        concurrency:\
              \ 4\n        discoverPods: false\n        zmqEndpoint: \"tcp://*:5557\"\
              \n  - name: kv\n    type: kv-cache-utilization-scorer\n  - name: qd\n\
              \    type: queue-scorer\n  - name: picker\n    type: max-score-picker\n\
              schedulingProfiles:\n  - name: default\n    plugins:\n      - pluginRef:\
              \ ppc\n        weight: 3.0\n      - pluginRef: kv\n        weight: 2.0\n\
              \      - pluginRef: qd\n        weight: 2.0\n      - pluginRef: picker\n"
        provider:
          name: istio
        istio:
          destinationRule:
            trafficPolicy:
              connectionPool:
                http:
                  http1MaxPendingRequests: 256000
                  maxRequestsPerConnection: 256000
                  http2MaxRequests: 256000
                  idleTimeout: 900s
                tcp:
                  maxConnections: 256000
                  maxConnectionDuration: 1800s
                  connectTimeout: 900s
    treatment:
      helmValues:
        inferenceExtension:
          image:
            hub: ghcr.io/kalantar
            name: llm-d-inference-scheduler
            tag: aw
            pullPolicy: Always
          pluginsConfigFile: custom-plugins.yaml
          flags:
            v: 5
          monitoring:
            interval: 5s
          extProcPort: 9002
          extraContainerPorts:
          - name: zmq
            containerPort: 5557
            protocol: TCP
          extraServicePorts:
          - name: zmq
            port: 5557
            targetPort: 5557
            protocol: TCP
          env:
          - name: HF_TOKEN
            valueFrom:
              secretKeyRef:
                name: hf-secret
                key: HF_TOKEN
          sidecar:
            enabled: true
            image: ghcr.io/llm-d/llm-d-uds-tokenizer:v0.7.1
            imagePullPolicy: IfNotPresent
            name: tokenizer-uds
            configMap:
              name: tokenizer-uds-config
              data:
                placeholder: ''
            env:
            - name: TOKENIZERS_DIR
              value: /tokenizers
            - name: HF_HOME
              value: /tokenizers
            volumeMounts:
            - mountPath: /tokenizers
              name: tokenizers
            - mountPath: /tmp/tokenizer
              name: tokenizer-uds
          volumes:
          - name: tokenizers
            emptyDir: {}
          - name: tokenizer-uds
            emptyDir: {}
          volumeMounts:
          - mountPath: /tmp/tokenizer
            name: tokenizer-uds
          pluginsCustomConfig:
            custom-plugins.yaml: "apiVersion: inference.networking.x-k8s.io/v1alpha1\n\
              kind: EndpointPickerConfig\nplugins:\n  - name: profile\n    type: single-profile-handler\n\
              \  - name: tokenizer\n    type: tokenizer\n    parameters:\n      modelName:\
              \ Qwen/Qwen3-14B\n      udsTokenizerConfig:\n        socketFile: /tmp/tokenizer/tokenizer-uds.socket\n\
              \  - name: ppc\n    type: precise-prefix-cache-scorer\n    parameters:\n\
              \      speculativeIndexing: true\n      tokenProcessorConfig:\n    \
              \    blockSize: 64\n      indexerConfig:\n        tokenizersPoolConfig:\n\
              \          modelName: Qwen/Qwen3-14B\n          local: null\n      \
              \    hf: null\n          uds:\n            socketFile: /tmp/tokenizer/tokenizer-uds.socket\n\
              \      kvEventsConfig:\n        topicFilter: \"kv@\"\n        concurrency:\
              \ 4\n        discoverPods: false\n        zmqEndpoint: \"tcp://*:5557\"\
              \n  - name: kv\n    type: kv-cache-utilization-scorer\n  - name: qd\n\
              \    type: queue-scorer\n  - name: delegation-scorer\n    type: adaptive-routing-scorer\n\
              \    parameters:\n      scorerNames: [\"ppc\", \"qd\", \"kv\"]\n   \
              \   baseWeights: [3.0, 2.0, 2.0]\n      mode: \"adaptive\"\n  - name:\
              \ picker\n    type: max-score-picker\nschedulingProfiles:\n  - name:\
              \ default\n    plugins:\n      - pluginRef: delegation-scorer\n    \
              \    weight: 1.0\n      - pluginRef: picker\n"
        provider:
          name: istio
        istio:
          destinationRule:
            trafficPolicy:
              connectionPool:
                http:
                  http1MaxPendingRequests: 256000
                  maxRequestsPerConnection: 256000
                  http2MaxRequests: 256000
                  idleTimeout: 900s
                tcp:
                  maxConnections: 256000
                  maxConnectionDuration: 1800s
                  connectTimeout: 900s
