apiVersion: tekton.dev/v1
kind: Pipeline
metadata:
  name: sim2real-treatment
spec:
  params:
  - name: experimentId
    type: string
  - name: namespace
    type: string
  - name: sleepDuration
    type: string
    default: 30s
  - name: runName
    type: string
  - name: workloadName
    type: string
  - name: workloadSpec
    type: string
  workspaces:
  - name: model-cache
  - name: hf-credentials
  - name: data-storage
  tasks:
  - name: download-model
    taskRef:
      name: download-model
    workspaces:
    - name: model-cache
      workspace: model-cache
    - name: hf-credentials
      workspace: hf-credentials
    params:
    - name: model
      value: Qwen/Qwen3-14B
  - name: deploy-gateway
    taskRef:
      name: deploy-gateway
    params:
    - name: experimentId
      value: $(params.experimentId)
    - name: namespace
      value: $(params.namespace)
    - name: config
      value:
        gateway:
          gatewayClassName: istio
          gatewayParameters:
            istio:
              accessLogging: false
            resources:
              limits:
                cpu: '16'
                memory: 16Gi
              requests:
                cpu: '4'
                memory: 4Gi
          provider: istio
  - name: deploy-gaie
    taskRef:
      name: deploy-gaie
    params:
    - name: modelLabel
      value: sim2real-$(params.experimentId)
    - name: config
      value: '{"inferenceExtension": {"image": {"hub": "ghcr.io/kalantar", "name": "llm-d-inference-scheduler", "tag": "aw", "pullPolicy": "Always"}, "pluginsConfigFile": "custom-plugins.yaml", "flags": {"v": 5}, "monitoring": {"interval": "5s"}, "extProcPort": 9002, "extraContainerPorts": [{"name": "zmq", "containerPort": 5557, "protocol": "TCP"}], "extraServicePorts": [{"name": "zmq", "port": 5557, "targetPort": 5557, "protocol": "TCP"}], "env": [{"name": "HF_TOKEN", "valueFrom": {"secretKeyRef": {"name": "hf-secret", "key": "HF_TOKEN"}}}], "sidecar": {"enabled": true, "image": "ghcr.io/llm-d/llm-d-uds-tokenizer:v0.7.1", "imagePullPolicy": "IfNotPresent", "name": "tokenizer-uds", "configMap": {"name": "tokenizer-uds-config", "data": {"placeholder": ""}}, "env": [{"name": "TOKENIZERS_DIR", "value": "/tokenizers"}, {"name": "HF_HOME", "value": "/tokenizers"}], "volumeMounts": [{"mountPath": "/tokenizers", "name": "tokenizers"}, {"mountPath": "/tmp/tokenizer", "name": "tokenizer-uds"}]}, "volumes": [{"name": "tokenizers", "emptyDir": {}}, {"name": "tokenizer-uds", "emptyDir": {}}], "volumeMounts": [{"mountPath": "/tmp/tokenizer", "name": "tokenizer-uds"}], "pluginsCustomConfig": {"custom-plugins.yaml": "apiVersion: inference.networking.x-k8s.io/v1alpha1\nkind: EndpointPickerConfig\nplugins:\n  - name: profile\n    type: single-profile-handler\n  - name: tokenizer\n    type: tokenizer\n    parameters:\n      modelName: Qwen/Qwen3-14B\n      udsTokenizerConfig:\n        socketFile: /tmp/tokenizer/tokenizer-uds.socket\n  - name: ppc\n    type: precise-prefix-cache-scorer\n    parameters:\n      tokenProcessorConfig:\n        blockSize: 64\n      indexerConfig:\n        speculativeIndexing: true\n        tokenizersPoolConfig:\n          modelName: Qwen/Qwen3-14B\n          local: null\n          hf: null\n          uds:\n            socketFile: /tmp/tokenizer/tokenizer-uds.socket\n      kvEventsConfig:\n        topicFilter: \"kv@\"\n        concurrency: 4\n        discoverPods: false\n        zmqEndpoint: \"tcp://*:5557\"\n  - name: kv\n    type: kv-cache-utilization-scorer\n  - name: qd\n    type: queue-scorer\n  - name: delegation-scorer\n    type: adaptive-routing-scorer\n    parameters:\n      scorerNames: [\"ppc\", \"qd\", \"kv\"]\n      baseWeights: [3.0, 2.0, 2.0]\n      mode: \"adaptive\"\n  - name: picker\n    type: max-score-picker\nschedulingProfiles:\n  - name: default\n    plugins:\n      - pluginRef: delegation-scorer\n        weight: 1.0\n      - pluginRef: picker\n"}}, "provider": {"name": "istio"}, "istio": {"destinationRule": {"trafficPolicy": {"connectionPool": {"http": {"http1MaxPendingRequests": 256000, "maxRequestsPerConnection": 256000, "http2MaxRequests": 256000, "idleTimeout": "900s"}, "tcp": {"maxConnections": 256000, "maxConnectionDuration": "1800s", "connectTimeout": "900s"}}}}}}'
    - name: namespace
      value: $(params.namespace)
  - name: deploy-model
    runAfter:
    - download-model
    - deploy-gaie
    taskRef:
      name: deploy-model
    workspaces:
    - name: model-cache
      workspace: model-cache
    params:
    - name: model
      value: Qwen/Qwen3-14B
    - name: modelLabel
      value: sim2real-$(params.experimentId)
    - name: namespace
      value: $(params.namespace)
    - name: config
      value:
        decode:
          containers:
          - args:
            - --max-model-len=40960
            - --block-size=64
            - --max-num-seqs=256
            - --max-num-batched-tokens=2048
            - --gpu-memory-utilization=0.75
            - --enable-prefix-caching
            - --enable-chunked-prefill
            - --kv-events-config
            - "{\n  \"enable_kv_cache_events\": true,\n  \"publisher\": \"zmq\",\n  \"endpoint\": \"tcp://gaie-$(GAIE_RELEASE_NAME_POSTFIX)-epp.$(NAMESPACE).svc.cluster.local:5557\",\n  \"topic\": \"kv@$(POD_IP):8000@Qwen/Qwen3-14B\"\n}"
            env:
            - name: GAIE_RELEASE_NAME_POSTFIX
              value: sim2real-aw
            - name: NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: POD_IP
              valueFrom:
                fieldRef:
                  apiVersion: v1
                  fieldPath: status.podIP
            - name: PYTHONHASHSEED
              value: '42'
            - name: TRITON_CACHE_DIR
              value: /tmp/.triton-cache
            extraConfig:
              readinessProbe:
                failureThreshold: 3
                httpGet:
                  path: /health
                  port: 8200
                periodSeconds: 5
              startupProbe:
                failureThreshold: 60
                httpGet:
                  path: /health
                  port: 8200
                initialDelaySeconds: 30
                periodSeconds: 10
            image: ghcr.io/llm-d/llm-d-cuda:v0.6.0
            modelCommand: vllmServe
            mountModelVolume: true
            resources:
              limits:
                nvidia.com/gpu: 1
              requests:
                nvidia.com/gpu: 1
          create: true
          extraConfig:
            affinity:
              nodeAffinity:
                requiredDuringSchedulingIgnoredDuringExecution:
                  nodeSelectorTerms:
                  - matchExpressions:
                    - key: nvidia.com/gpu.product
                      operator: In
                      values:
                      - NVIDIA-H100-80GB-HBM3
                    - key: kubernetes.io/hostname
                      operator: NotIn
                      values:
                      - pokprod-b93r39s0
                      - pokprod-b93r43s2
                      - pokprod-b93r38s0
                      - pokprod-b93r43s1
          replicas: 4
        modelArtifacts:
          authSecretName: hf-secret
        prefill:
          create: false
        routing:
          servicePort: 8000
  - name: pause-after-model-deploy
    runAfter:
    - deploy-model
    taskRef:
      name: sleep
    params:
    - name: duration
      value: $(params.sleepDuration)
  - name: deploy-httproute
    runAfter:
    - deploy-gateway
    - deploy-gaie
    taskRef:
      name: deploy-httproute
    params:
    - name: namespace
      value: $(params.namespace)
    - name: gateway
      value: $(tasks.deploy-gateway.results.gateway)
    - name: inferencepool
      value: $(tasks.deploy-gaie.results.inferencepool)
    - name: modelLabel
      value: sim2real-$(params.experimentId)
  - name: deploy-inference-objectives
    runAfter:
    - deploy-gaie
    taskRef:
      name: deploy-inference-objectives
    params:
    - name: namespace
      value: $(params.namespace)
    - name: inferencepool
      value: $(tasks.deploy-gaie.results.inferencepool)
    - name: objectives
      value: '[]'
  - name: run-workload
    runAfter:
    - pause-after-model-deploy
    - deploy-httproute
    - deploy-inference-objectives
    taskRef:
      name: run-workload-blis-observe
    workspaces:
    - name: data
      workspace: data-storage
    params:
    - name: endpoint
      value: http://$(tasks.deploy-gateway.results.endpoint)/sim2real-$(params.experimentId)
    - name: model
      value: Qwen/Qwen3-14B
    - name: workloadSpec
      value: $(params.workloadSpec)
    - name: blisImage
      value: ghcr.io/inference-sim/blis:v0.7.6
    - name: resultsDir
      value: $(params.runName)/treatment/$(params.workloadName)
  - name: collect-results
    runAfter:
    - run-workload
    taskRef:
      name: collect-results
    workspaces:
    - name: data
      workspace: data-storage
    params:
    - name: namespace
      value: $(params.namespace)
    - name: modelLabel
      value: sim2real-$(params.experimentId)
    - name: resultsDir
      value: $(params.runName)/treatment/$(params.workloadName)
    - name: containerName
      value: $(tasks.deploy-gaie.results.epp-container)
  finally:
  - name: delete-inference-objectives
    taskRef:
      name: delete-inference-objectives
    params:
    - name: objectives
      value: '[]'
    - name: namespace
      value: $(params.namespace)
  - name: delete-httproute
    taskRef:
      name: delete-httproute
    params:
    - name: modelLabel
      value: sim2real-$(params.experimentId)
    - name: namespace
      value: $(params.namespace)
  - name: delete-model
    taskRef:
      name: delete-model
    params:
    - name: modelLabel
      value: sim2real-$(params.experimentId)
    - name: namespace
      value: $(params.namespace)
  - name: delete-gaie
    taskRef:
      name: delete-gaie
    params:
    - name: modelLabel
      value: sim2real-$(params.experimentId)
    - name: namespace
      value: $(params.namespace)
  - name: delete-gateway
    taskRef:
      name: delete-gateway
    params:
    - name: experimentId
      value: $(params.experimentId)
    - name: namespace
      value: $(params.namespace)
