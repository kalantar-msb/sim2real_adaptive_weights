apiVersion: tekton.dev/v1
kind: PipelineRun
metadata:
  name: treatment-w1-prefix-to-load-shift-aw
  namespace: kalantar
spec:
  params:
  - name: experimentId
    value: aw
  - name: runName
    value: aw
  - name: namespace
    value: kalantar
  - name: phase
    value: treatment
  - name: gaieConfig
    value: '{"inferenceExtension": {"image": {"hub": "ghcr.io/kalantar", "name": "llm-d-inference-scheduler",
      "tag": "aw", "pullPolicy": "Always"}, "pluginsConfigFile": "custom-plugins.yaml",
      "flags": {"v": 5}, "monitoring": {"interval": "5s"}, "extProcPort": 9002, "extraContainerPorts":
      [{"name": "zmq", "containerPort": 5557, "protocol": "TCP"}], "extraServicePorts":
      [{"name": "zmq", "port": 5557, "targetPort": 5557, "protocol": "TCP"}], "env":
      [{"name": "HF_TOKEN", "valueFrom": {"secretKeyRef": {"name": "hf-secret", "key":
      "HF_TOKEN"}}}], "sidecar": {"enabled": true, "image": "ghcr.io/llm-d/llm-d-uds-tokenizer:v0.7.1",
      "imagePullPolicy": "IfNotPresent", "name": "tokenizer-uds", "configMap": {"name":
      "tokenizer-uds-config", "data": {"placeholder": ""}}, "env": [{"name": "TOKENIZERS_DIR",
      "value": "/tokenizers"}, {"name": "HF_HOME", "value": "/tokenizers"}], "volumeMounts":
      [{"mountPath": "/tokenizers", "name": "tokenizers"}, {"mountPath": "/tmp/tokenizer",
      "name": "tokenizer-uds"}]}, "volumes": [{"name": "tokenizers", "emptyDir": {}},
      {"name": "tokenizer-uds", "emptyDir": {}}], "volumeMounts": [{"mountPath": "/tmp/tokenizer",
      "name": "tokenizer-uds"}], "pluginsCustomConfig": {"custom-plugins.yaml": "apiVersion:
      inference.networking.x-k8s.io/v1alpha1\nkind: EndpointPickerConfig\nplugins:\n  -
      name: profile\n    type: single-profile-handler\n  - name: tokenizer\n    type:
      tokenizer\n    parameters:\n      modelName: Qwen/Qwen3-14B\n      udsTokenizerConfig:\n        socketFile:
      /tmp/tokenizer/tokenizer-uds.socket\n  - name: ppc\n    type: precise-prefix-cache-scorer\n    parameters:\n      speculativeIndexing:
      true\n      tokenProcessorConfig:\n        blockSize: 64\n      indexerConfig:\n        tokenizersPoolConfig:\n          modelName:
      Qwen/Qwen3-14B\n          local: null\n          hf: null\n          uds:\n            socketFile:
      /tmp/tokenizer/tokenizer-uds.socket\n      kvEventsConfig:\n        topicFilter:
      \"kv@\"\n        concurrency: 4\n        discoverPods: false\n        zmqEndpoint:
      \"tcp://*:5557\"\n  - name: kv\n    type: kv-cache-utilization-scorer\n  - name:
      qd\n    type: queue-scorer\n  - name: delegation-scorer\n    type: adaptive-routing-scorer\n    parameters:\n      scorerNames:
      [\"ppc\", \"qd\", \"kv\"]\n      baseWeights: [3.0, 2.0, 2.0]\n      mode: \"adaptive\"\n  -
      name: picker\n    type: max-score-picker\nschedulingProfiles:\n  - name: default\n    plugins:\n      -
      pluginRef: delegation-scorer\n        weight: 1.0\n      - pluginRef: picker\n"}},
      "provider": {"name": "istio"}, "istio": {"destinationRule": {"trafficPolicy":
      {"connectionPool": {"http": {"http1MaxPendingRequests": 256000, "maxRequestsPerConnection":
      256000, "http2MaxRequests": 256000, "idleTimeout": "900s"}, "tcp": {"maxConnections":
      256000, "maxConnectionDuration": "1800s", "connectTimeout": "900s"}}}}}}'
  - name: inferenceObjectives
    value: '[]'
  - name: workloadName
    value: w1_prefix_to_load_shift
  - name: workloadSpec
    value: "{aggregate_rate: 40, clients: [{arrival: {process: poisson}, id: phase1-prefix-A,\n\
      \      input_distribution: {params: {max: 1024, mean: 512, min: 128, std_dev:\
      \ 128},\n        type: gaussian}, lifecycle: {windows: [{end_us: 200000000,\
      \ start_us: 0}]},\n      output_distribution: {params: {max: 768, mean: 256,\
      \ min: 32, std_dev: 128},\n        type: gaussian}, prefix_group: system-prompt-A,\
      \ prefix_length: 512, rate_fraction: 0.7,\n      streaming: true}, {arrival:\
      \ {process: poisson}, id: phase1-cold, input_distribution: {\n        params:\
      \ {max: 512, mean: 256, min: 64, std_dev: 64}, type: gaussian}, lifecycle: {\n\
      \        windows: [{end_us: 200000000, start_us: 0}]}, output_distribution:\
      \ {params: {\n          max: 512, mean: 128, min: 32, std_dev: 64}, type: gaussian},\
      \ rate_fraction: 0.3,\n      streaming: true}, {arrival: {process: poisson},\
      \ id: phase2-cold, input_distribution: {\n        params: {max: 768, mean: 384,\
      \ min: 64, std_dev: 128}, type: gaussian}, lifecycle: {\n        windows: [{end_us:\
      \ 400000000, start_us: 200000000}]}, output_distribution: {\n        params:\
      \ {max: 640, mean: 192, min: 32, std_dev: 96}, type: gaussian}, rate_fraction:\
      \ 1.0,\n      streaming: true}], horizon: 400000000, num_requests: 20000, seed:\
      \ 42, version: '2'}"
  pipelineRef:
    name: sim2real-aw
  timeouts:
    pipeline: 4h
  workspaces:
  - name: model-cache
    persistentVolumeClaim:
      claimName: model-pvc
  - name: data-storage
    persistentVolumeClaim:
      claimName: data-pvc
  - name: hf-credentials
    secret:
      secretName: hf-secret
