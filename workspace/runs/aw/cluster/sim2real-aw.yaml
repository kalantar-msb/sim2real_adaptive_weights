apiVersion: tekton.dev/v1
kind: Pipeline
metadata:
  name: sim2real-aw
spec:
  params:
  - name: experimentId
    type: string
  - name: namespace
    type: string
  - name: sleepDuration
    type: string
    default: 30s
  - name: runName
    type: string
  - name: phase
    type: string
  - name: gaieConfig
    type: string
  - name: inferenceObjectives
    type: string
  - name: workloadName
    type: string
  - name: workloadSpec
    type: string
  workspaces:
  - name: model-cache
  - name: hf-credentials
  - name: data-storage
  tasks:
  - name: download-model
    taskRef:
      name: download-model
    workspaces:
    - name: model-cache
      workspace: model-cache
    - name: hf-credentials
      workspace: hf-credentials
    params:
    - name: model
      value: Qwen/Qwen3-14B
  - name: deploy-gateway
    taskRef:
      name: deploy-gateway
    params:
    - name: experimentId
      value: $(params.experimentId)
    - name: namespace
      value: $(params.namespace)
    - name: config
      value:
        gateway:
          gatewayClassName: istio
          gatewayParameters:
            istio:
              accessLogging: false
            resources:
              limits:
                cpu: '16'
                memory: 16Gi
              requests:
                cpu: '4'
                memory: 4Gi
          provider: istio
  - name: deploy-gaie
    taskRef:
      name: deploy-gaie
    params:
    - name: modelLabel
      value: sim2real-$(params.experimentId)
    - name: config
      value: $(params.gaieConfig)
    - name: namespace
      value: $(params.namespace)
  - name: deploy-model
    runAfter:
    - download-model
    - deploy-gaie
    taskRef:
      name: deploy-model
    workspaces:
    - name: model-cache
      workspace: model-cache
    params:
    - name: model
      value: Qwen/Qwen3-14B
    - name: modelLabel
      value: sim2real-$(params.experimentId)
    - name: namespace
      value: $(params.namespace)
    - name: config
      value:
        decode:
          containers:
          - args:
            - --max-model-len=40960
            - --block-size=64
            - --max-num-seqs=256
            - --max-num-batched-tokens=2048
            - --gpu-memory-utilization=0.75
            - --enable-prefix-caching
            - --enable-chunked-prefill
            - --kv-events-config
            - "{\n  \"enable_kv_cache_events\": true,\n  \"publisher\": \"zmq\",\n  \"endpoint\": \"tcp://gaie-$(GAIE_RELEASE_NAME_POSTFIX)-epp.$(NAMESPACE).svc.cluster.local:5557\",\n  \"topic\": \"kv@$(POD_IP):8000@Qwen/Qwen3-14B\"\n}"
            env:
            - name: GAIE_RELEASE_NAME_POSTFIX
              value: sim2real-aw
            - name: NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: POD_IP
              valueFrom:
                fieldRef:
                  apiVersion: v1
                  fieldPath: status.podIP
            - name: PYTHONHASHSEED
              value: '42'
            - name: TRITON_CACHE_DIR
              value: /tmp/.triton-cache
            extraConfig:
              readinessProbe:
                failureThreshold: 3
                httpGet:
                  path: /health
                  port: 8200
                periodSeconds: 5
              startupProbe:
                failureThreshold: 60
                httpGet:
                  path: /health
                  port: 8200
                initialDelaySeconds: 30
                periodSeconds: 10
            image: ghcr.io/llm-d/llm-d-cuda:v0.6.0
            modelCommand: vllmServe
            mountModelVolume: true
            resources:
              limits:
                nvidia.com/gpu: 1
              requests:
                nvidia.com/gpu: 1
          create: true
          extraConfig:
            affinity:
              nodeAffinity:
                requiredDuringSchedulingIgnoredDuringExecution:
                  nodeSelectorTerms:
                  - matchExpressions:
                    - key: nvidia.com/gpu.product
                      operator: In
                      values:
                      - NVIDIA-H100-80GB-HBM3
                    - key: kubernetes.io/hostname
                      operator: NotIn
                      values:
                      - pokprod-b93r39s0
                      - pokprod-b93r43s2
                      - pokprod-b93r38s0
                      - pokprod-b93r43s1
          replicas: 4
        modelArtifacts:
          authSecretName: hf-secret
        prefill:
          create: false
        routing:
          servicePort: 8000
  - name: pause-after-model-deploy
    runAfter:
    - deploy-model
    taskRef:
      name: sleep
    params:
    - name: duration
      value: $(params.sleepDuration)
  - name: deploy-httproute
    runAfter:
    - deploy-gateway
    - deploy-gaie
    taskRef:
      name: deploy-httproute
    params:
    - name: namespace
      value: $(params.namespace)
    - name: gateway
      value: $(tasks.deploy-gateway.results.gateway)
    - name: inferencepool
      value: $(tasks.deploy-gaie.results.inferencepool)
    - name: modelLabel
      value: sim2real-$(params.experimentId)
  - name: deploy-inference-objectives
    runAfter:
    - deploy-gaie
    taskRef:
      name: deploy-inference-objectives
    params:
    - name: namespace
      value: $(params.namespace)
    - name: inferencepool
      value: $(tasks.deploy-gaie.results.inferencepool)
    - name: objectives
      value: $(params.inferenceObjectives)
  - name: run-workload
    runAfter:
    - pause-after-model-deploy
    - deploy-httproute
    - deploy-inference-objectives
    taskRef:
      name: run-workload-blis-observe
    workspaces:
    - name: data
      workspace: data-storage
    params:
    - name: endpoint
      value: http://$(tasks.deploy-gateway.results.endpoint)/sim2real-$(params.experimentId)
    - name: model
      value: Qwen/Qwen3-14B
    - name: workloadSpec
      value: $(params.workloadSpec)
    - name: blisImage
      value: ghcr.io/inference-sim/blis:v0.7.10
    - name: resultsDir
      value: $(params.runName)/$(params.phase)/$(params.workloadName)
  - name: collect-results
    runAfter:
    - run-workload
    taskRef:
      name: collect-results
    workspaces:
    - name: data
      workspace: data-storage
    params:
    - name: namespace
      value: $(params.namespace)
    - name: modelLabel
      value: sim2real-$(params.experimentId)
    - name: resultsDir
      value: $(params.runName)/$(params.phase)/$(params.workloadName)
    - name: containerName
      value: $(tasks.deploy-gaie.results.epp-container)
  finally:
  - name: delete-inference-objectives
    taskRef:
      name: delete-inference-objectives
    params:
    - name: objectives
      value: $(params.inferenceObjectives)
    - name: namespace
      value: $(params.namespace)
  - name: delete-httproute
    taskRef:
      name: delete-httproute
    params:
    - name: modelLabel
      value: sim2real-$(params.experimentId)
    - name: namespace
      value: $(params.namespace)
  - name: delete-model
    taskRef:
      name: delete-model
    params:
    - name: modelLabel
      value: sim2real-$(params.experimentId)
    - name: namespace
      value: $(params.namespace)
  - name: delete-gaie
    taskRef:
      name: delete-gaie
    params:
    - name: modelLabel
      value: sim2real-$(params.experimentId)
    - name: namespace
      value: $(params.namespace)
  - name: delete-gateway
    taskRef:
      name: delete-gateway
    params:
    - name: experimentId
      value: $(params.experimentId)
    - name: namespace
      value: $(params.namespace)
