# W1: Prefix → Load shift (phased)
#
# Phase 1 (0-200s): 70% prefix-A traffic + 30% cold at 40 QPS
#   → prefix scorer is highly informative (one hot instance)
#   → static 3:2:2 overweights prefix, creates hotspot
#
# Phase 2 (200-400s): 100% cold traffic at 40 QPS
#   → prefix scores are all equal (no differentiation)
#   → static 3:2:2 wastes 3/7 of weight on a useless signal
#   → adaptive should shift weight to queue-depth and kv-utilization
#
# 20000 requests total, ~10000 per phase.

version: "2"
seed: 42
aggregate_rate: 40
num_requests: 20000
horizon: 400000000   # 400s — bounds generation to experiment duration (phases end at 400s)

clients:
  # Phase 1: prefix-heavy (0-50s)
  - id: "phase1-prefix-A"
    prefix_group: "system-prompt-A"
    prefix_length: 512
    rate_fraction: 0.70
    streaming: true
    arrival: {process: poisson}
    input_distribution: {type: gaussian, params: {mean: 512, std_dev: 128, min: 128, max: 1024}}
    output_distribution: {type: gaussian, params: {mean: 256, std_dev: 128, min: 32, max: 768}}
    lifecycle:
      windows:
        - start_us: 0
          end_us: 200000000

  - id: "phase1-cold"
    rate_fraction: 0.30
    streaming: true
    arrival: {process: poisson}
    input_distribution: {type: gaussian, params: {mean: 256, std_dev: 64, min: 64, max: 512}}
    output_distribution: {type: gaussian, params: {mean: 128, std_dev: 64, min: 32, max: 512}}
    lifecycle:
      windows:
        - start_us: 0
          end_us: 200000000

  # Phase 2: all cold traffic (200-400s)
  - id: "phase2-cold"
    rate_fraction: 1.0
    streaming: true
    arrival: {process: poisson}
    input_distribution: {type: gaussian, params: {mean: 384, std_dev: 128, min: 64, max: 768}}
    output_distribution: {type: gaussian, params: {mean: 192, std_dev: 96, min: 32, max: 640}}
    lifecycle:
      windows:
        - start_us: 200000000
          end_us: 400000000
